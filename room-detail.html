<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Details - AirQ Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .page-header-flex { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .room-status-badge { padding: 8px 16px; border-radius: 30px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .status-success { background: rgba(5, 205, 153, 0.1); color: var(--success); border: 1px solid rgba(5, 205, 153, 0.3); }
        .status-warning { background: rgba(255, 176, 32, 0.1); color: var(--warning); border: 1px solid rgba(255, 176, 32, 0.3); }
        .status-danger { background: rgba(238, 93, 80, 0.15); color: var(--danger); border: 1px solid rgba(238, 93, 80, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(238, 93, 80, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(238, 93, 80, 0); } 100% { box-shadow: 0 0 0 0 rgba(238, 93, 80, 0); } }
        .chart-wrapper { position: relative; height: 400px; width: 100%; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div>
            <div class="sidebar-header">AirQ <span>Monitor</span></div>
            <ul>
                <li><a href="dashboard.html"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
                <li class="active"><a href="room.html"><i class='bx bxs-layout'></i> Rooms</a></li>
                <li><a href="setting.html"><i class='bx bxs-cog'></i> Settings</a></li>
            </ul>
        </div>
        <ul class="logout-section">
            <li><a href="#" class="logout-btn" id="btnLogout"><i class='bx bx-log-out'></i> ออกจากระบบ</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <a href="room.html" class="back-link"><i class='bx bx-arrow-back'></i> ย้อนกลับไปหน้าห้องทั้งหมด</a>

        <div class="page-header-flex">
            <header style="margin-bottom: 0;">
                <h1 id="room-title">กำลังโหลด...</h1>
                <p><i class='bx bx-time-five'></i> ข้อมูลอัปเดตล่าสุด: <span id="update-time">...</span></p>
            </header>
            <div id="status-badge" class="room-status-badge status-success">
                <i id="status-icon" class='bx bxs-check-circle'></i> <span id="status-text">...</span>
            </div>
        </div>

        <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="stat-item border-info">
                <span class="label"><i class='bx bxs-thermometer'></i> อุณหภูมิ</span>
                <span class="stat-val" id="temp-val">-- <span style="font-size: 18px; color: var(--text-muted);">°C</span></span>
            </div>
            <div class="stat-item border-info" style="border-left-color: #00B5D8 !important;">
                <span class="label"><i class='bx bx-water'></i> ความชื้นสัมพัทธ์</span>
                <span class="stat-val" id="humid-val">-- <span style="font-size: 18px; color: var(--text-muted);">%</span></span>
            </div>
            <div class="stat-item border-success" id="pm-card">
                <span class="label"><i class='bx bx-wind'></i> ฝุ่น PM 2.5</span>
                <span class="stat-val" id="pm-val">-- <span style="font-size: 18px; color: var(--text-muted);">µg/m³</span></span>
            </div>
            <div class="stat-item border-info" style="border-left-color: #9C27B0 !important;">
                <span class="label"><i class='bx bx-spray-can'></i> ระดับกลิ่น (Odor)</span>
                <span class="stat-val" id="odor-val">-- <span style="font-size: 18px; color: var(--text-muted);">ppm</span></span>
            </div>
        </div>

        <div class="chart-container">
            <h3><i class='bx bx-line-chart'></i> ข้อมูลความเปลี่ยนแปลงย้อนหลัง (10 รายการล่าสุด)</h3>
            <div class="chart-wrapper">
                <canvas id="roomDetailChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Check Auth
        fetch('api/api.php?action=check_auth').then(r=>r.json()).then(d=>{ if(d.status!=='success') window.location.href="index.html"; });
        document.getElementById('btnLogout').addEventListener('click', (e) => { e.preventDefault(); fetch('api/api.php?action=logout').then(()=>window.location.href="index.html"); });

        // Get Room ID
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || '401';
        document.getElementById('room-title').innerText = `ห้อง ${roomId}`;

        // Setup Chart
        Chart.defaults.color = '#CBD5E1';
        Chart.defaults.font.family = 'Prompt';
        const ctx = document.getElementById('roomDetailChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'อุณหภูมิ (°C)', data: [], borderColor: '#EE5D50', backgroundColor: 'rgba(238, 93, 80, 0.1)', borderWidth: 3, tension: 0.4, yAxisID: 'y' },
                { label: 'ฝุ่น PM 2.5', data: [], borderColor: '#FFCE20', backgroundColor: 'rgba(255, 206, 32, 0.1)', borderWidth: 3, tension: 0.4, yAxisID: 'y' },
                { label: 'ความชื้น (%)', data: [], borderColor: '#00B5D8', backgroundColor: 'rgba(0, 181, 216, 0.1)', borderWidth: 3, borderDash: [5, 5], tension: 0.4, yAxisID: 'y1' },
                { label: 'ระดับกลิ่น (ppm)', data: [], borderColor: '#9C27B0', backgroundColor: 'rgba(156, 39, 176, 0.1)', borderWidth: 3, borderDash: [2, 2], tension: 0.4, yAxisID: 'y1' }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: { grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'อุณหภูมิ / PM 2.5', color: '#CBD5E1' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'ความชื้น / กลิ่น', color: '#00B5D8' }, grid: { drawOnChartArea: false } }
                },
                plugins: { legend: { display: true, position: 'top', labels: { usePointStyle: true } } }
            }
        });

        // Fetch Data Function
        async function loadRoomDetail() {
            try {
                const res = await fetch(`api/api.php?action=room_detail&room=${roomId}`);
                const data = await res.json();
                
                if (data.latest) {
                    const l = data.latest;
                    document.getElementById('update-time').innerText = new Date(l.updated_at).toLocaleTimeString('th-TH');
                    document.getElementById('status-badge').className = `room-status-badge status-${l.status_color}`;
                    document.getElementById('status-icon').className = `bx ${l.status_icon || 'bx-info-circle'}`;
                    document.getElementById('status-text').innerText = l.status_text;
                    
                    document.getElementById('temp-val').innerHTML = `${l.temp} <span style="font-size: 18px; color: var(--text-muted);">°C</span>`;
                    document.getElementById('humid-val').innerHTML = `${l.humid} <span style="font-size: 18px; color: var(--text-muted);">%</span>`;
                    
                    document.getElementById('pm-card').className = `stat-item border-${l.status_color}`;
                    let pmColorClass = l.status_color !== 'success' ? `text-${l.status_color}` : '';
                    document.getElementById('pm-val').innerHTML = `<span class="${pmColorClass}">${l.pm}</span> <span style="font-size: 18px; color: var(--text-muted);">µg/m³</span>`;
                    document.getElementById('odor-val').innerHTML = `${l.odor} <span style="font-size: 18px; color: var(--text-muted);">ppm</span>`;
                }

                if (data.history) {
                    myChart.data.labels = data.history.map(h => new Date(h.created_at).toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit'}));
                    myChart.data.datasets[0].data = data.history.map(h => h.temp);
                    myChart.data.datasets[1].data = data.history.map(h => h.pm);
                    myChart.data.datasets[2].data = data.history.map(h => h.humid);
                    myChart.data.datasets[3].data = data.history.map(h => h.odor);
                    myChart.update();
                }
            } catch (error) {
                console.error("Failed to load room details:", error);
            }
        }
        loadRoomDetail(); 
        setInterval(loadRoomDetail, 5000);
    </script>
</body>
</html>
