<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AirQ Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .login-wrapper { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: var(--border-radius); box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; backdrop-filter: var(--glass-blur); border: var(--glass-border); }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        .login-header { font-size: 32px; font-weight: 700; color: var(--text-main); margin-bottom: 5px; }
        .login-header span { color: var(--success); }
        .login-sub { color: var(--text-muted); margin-bottom: 30px; font-size: 15px; }
        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-icon { position: absolute; left: 15px; top: 40px; color: rgba(255,255,255,0.5); font-size: 20px; }
        .btn-register { background: var(--success); color: white; }
        .btn-register:hover { background: #04b386; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(5, 205, 153, 0.4); }
        .toggle-link { margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .toggle-link a { color: var(--info); text-decoration: none; font-weight: 600; transition: var(--transition); }
        .toggle-link a:hover { text-decoration: underline; color: white; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card fade-in">
            <div class="login-header">สร้างบัญชี <span>ใหม่</span></div>
            <div class="login-sub">ลงทะเบียนเพื่อเข้าใช้งานระบบ AirQ</div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="regUsername">ตั้งชื่อผู้ใช้งาน (Username)</label>
                    <i class='bx bx-user input-icon'></i>
                    <input type="text" id="regUsername" placeholder="ตั้งชื่อผู้ใช้งาน" required style="padding-left: 45px;">
                </div>
                
                <div class="input-group">
                    <label for="regPassword">ตั้งรหัสผ่าน (Password)</label>
                    <i class='bx bx-lock-alt input-icon'></i>
                    <input type="password" id="regPassword" placeholder="ความยาวอย่างน้อย 6 ตัวอักษร" required minlength="6" style="padding-left: 45px;">
                </div>
                
                <div class="input-group">
                    <label for="regConfirmPassword">ยืนยันรหัสผ่าน (Confirm)</label>
                    <i class='bx bx-check-shield input-icon'></i>
                    <input type="password" id="regConfirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" required minlength="6" style="padding-left: 45px;">
                </div>
                
                <button type="submit" class="btn btn-register" id="regBtn"><i class='bx bx-user-plus'></i> ลงทะเบียน</button>
            </form>
            
            <div class="toggle-link">
                มีบัญชีอยู่แล้ว? <a href="index.html">กลับไปหน้าเข้าสู่ระบบ</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) { 
                alert("รหัสผ่านไม่ตรงกัน กรุณาตรวจสอบอีกครั้ง!"); 
                return; 
            }

            const btn = document.getElementById('regBtn'); 
            btn.innerText = "กำลังลงทะเบียน..."; 
            btn.disabled = true;

            try {
                const res = await fetch('api/api.php?action=register', {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        username: document.getElementById('regUsername').value.trim(), 
                        password: password 
                    })
                });
                const result = await res.json();
                
                if (result.status === 'success') { 
                    alert("สมัครสมาชิกสำเร็จ! ระบบจะพาไปที่หน้า Dashboard"); 
                    window.location.href = "dashboard.html"; 
                } else { 
                    alert(result.message); 
                    btn.innerHTML = "<i class='bx bx-user-plus'></i> ลงทะเบียน"; 
                    btn.disabled = false; 
                }
            } catch (error) {
                alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
                btn.innerHTML = "<i class='bx bx-user-plus'></i> ลงทะเบียน"; 
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
