<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms - AirQ Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .search-wrapper { position: relative; width: 100%; max-width: 320px; }
        .search-icon { position: absolute; left: 15px; top: 14px; color: rgba(255,255,255,0.5); font-size: 20px; }
        .search-input { padding-left: 45px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div>
            <div class="sidebar-header">AirQ <span>Monitor</span></div>
            <ul>
                <li><a href="dashboard.html"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
                <li class="active"><a href="room.html"><i class='bx bxs-layout'></i> Rooms</a></li>
                <li><a href="setting.html"><i class='bx bxs-cog'></i> Settings</a></li>
            </ul>
        </div>
        <ul class="logout-section">
            <li><a href="#" class="logout-btn" id="btnLogout"><i class='bx bx-log-out'></i> ออกจากระบบ</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="header-flex">
            <header style="margin-bottom: 0;">
                <h1>สถานะห้องเรียนทั้งหมด</h1>
                <p>ข้อมูลล่าสุดจากเซนเซอร์ทุกจุดติดตั้งแบบเรียลไทม์</p>
            </header>

            <div class="search-wrapper">
                <i class='bx bx-search search-icon'></i>
                <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาชื่อห้อง / เลขห้อง...">
            </div>
        </div>

        <div class="room-container" id="roomsContainer">
            <p style="color: var(--text-muted); text-align: center; width: 100%;">กำลังโหลดข้อมูล...</p>
        </div>
    </main>

    <script>
        // Check Auth & Logout
        fetch('api/api.php?action=check_auth').then(r=>r.json()).then(d=>{ if(d.status!=='success') window.location.href="index.html"; });
        document.getElementById('btnLogout').addEventListener('click', (e) => { e.preventDefault(); fetch('api/api.php?action=logout').then(()=>window.location.href="index.html"); });

        let allRoomsData = [];

        async function loadRooms() {
            try {
                const res = await fetch('api/api.php?action=rooms');
                allRoomsData = await res.json();
                renderRooms(); 
            } catch (error) {
                console.error("Failed to load rooms:", error);
            }
        }

        function renderRooms() {
            const container = document.getElementById('roomsContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            container.innerHTML = '';
            
            if(allRoomsData.length === 0) {
                return container.innerHTML = '<p style="color: var(--text-muted); text-align: center; width: 100%;">ยังไม่มีข้อมูลเซนเซอร์ในระบบ</p>';
            }

            const filteredRooms = allRoomsData.filter(data => data.room_id.toLowerCase().includes(searchTerm));

            if(filteredRooms.length === 0) {
                return container.innerHTML = `<p style="color: var(--text-muted); text-align: center; width: 100%; padding: 40px 0;">ไม่พบห้องที่ค้นหา <b>"${searchTerm}"</b></p>`;
            }

            filteredRooms.forEach(data => {
                let timeStr = new Date(data.updated_at).toLocaleTimeString('th-TH');
                let dangerStyle = data.status_color === 'danger' ? 'style="background:rgba(238,93,80,0.1);color:var(--danger);"' : '';
                let btnText = data.status_color === 'danger' ? 'ตรวจสอบด่วน' : 'ดูข้อมูลรายห้อง';
                let tempWarning = data.temp > 35 ? 'text-danger' : '';
                let pmWarning = data.pm > 37.5 ? `text-${data.status_color}` : '';

                container.innerHTML += `
                    <div class="room-card border-${data.status_color}">
                        <div class="card-title">ห้อง ${data.room_id}</div>
                        <div class="update-time"><i class='bx bx-time-five'></i> อัปเดตเมื่อ: ${timeStr}</div>
                        <div class="status-pill bg-${data.status_color}">${data.status_text}</div>
                        <div class="data-grid">
                            <div class="data-item">
                                <span class="label ${tempWarning}">อุณหภูมิ</span>
                                <span class="value ${tempWarning}">${data.temp} °C</span>
                            </div>
                            <div class="data-item">
                                <span class="label">ความชื้น</span>
                                <span class="value">${data.humid} %</span>
                            </div>
                            <div class="data-item">
                                <span class="label ${pmWarning}">ฝุ่น PM 2.5</span>
                                <span class="value ${pmWarning}">${data.pm} µg/m³</span>
                            </div>
                        </div>
                        <a href="room-detail.html?room=${data.room_id}" class="btn-detail" ${dangerStyle}>
                            ${btnText} <i class='bx bx-right-arrow-alt'></i>
                        </a>
                    </div>`;
            });
        }

        document.getElementById('searchInput').addEventListener('input', renderRooms);

        loadRooms(); 
        setInterval(loadRooms, 5000); 
    </script>
</body>
</html>
