<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AirQ Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .login-wrapper { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: var(--border-radius); box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; backdrop-filter: var(--glass-blur); border: var(--glass-border); }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        .login-header { font-size: 32px; font-weight: 700; color: var(--text-main); margin-bottom: 5px; }
        .login-sub { color: var(--text-muted); margin-bottom: 30px; font-size: 15px; }
        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-icon { position: absolute; left: 15px; top: 40px; color: rgba(255,255,255,0.5); font-size: 20px; }
        .btn-forgot { background: var(--info); color: white; }
        .btn-forgot:hover { background: #0096b3; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(57, 184, 255, 0.4); }
        .toggle-link { margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .toggle-link a { color: var(--primary); text-decoration: none; font-weight: 600; transition: var(--transition); }
        .toggle-link a:hover { text-decoration: underline; color: white; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card fade-in">
            <div class="login-header">ลืมรหัสผ่าน?</div>
            <div class="login-sub">กรุณากรอกชื่อผู้ใช้เพื่อดำเนินการ</div>
            
            <form id="forgotForm">
                <div class="input-group">
                    <label for="forgotUsername">ชื่อผู้ใช้งาน (Username)</label>
                    <i class='bx bx-user input-icon'></i>
                    <input type="text" id="forgotUsername" placeholder="กรอกชื่อผู้ใช้งาน" required style="padding-left: 45px;">
                </div>

                <div class="input-group">
                    <label for="newPassword">รหัสผ่านใหม่ (New Password)</label>
                    <i class='bx bx-lock-alt input-icon'></i>
                    <input type="password" id="newPassword" placeholder="รหัสผ่านใหม่" required minlength="6" style="padding-left: 45px;">
                </div>

                <button type="submit" class="btn btn-forgot" id="forgotBtn">ยืนยันการเปลี่ยนรหัสผ่าน</button>
            </form>
            
            <div class="toggle-link">
                จำรหัสผ่านได้แล้ว? <a href="index.html">กลับไปเข้าสู่ระบบ</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('forgotUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            const btn = document.getElementById('forgotBtn');

            btn.innerText = "กำลังประมวลผล...";
            btn.disabled = true;

            try {
                const res = await fetch('api/api.php?action=reset_password_direct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, new_password: password })
                });

                const result = await res.json();
                if (result.status === 'success') {
                    alert(`✅ สำเร็จ! รหัสผ่านของบัญชี ${username} ถูกเปลี่ยนแล้ว`);
                    window.location.href = "index.html"; 
                } else {
                    alert("❌ ผิดพลาด: " + result.message);
                    btn.innerText = "ยืนยันการเปลี่ยนรหัสผ่าน";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้");
                btn.innerText = "ยืนยันการเปลี่ยนรหัสผ่าน";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
